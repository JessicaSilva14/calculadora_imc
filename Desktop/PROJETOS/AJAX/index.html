<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Github</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <img id="avatar" class="profile-avatar" src="https://via.placeholder.com/180x180" alt="Avatar">
        
        <h1 id="name" class="profile-name">Carregando...</h1>
        <h2 id="username" class="profile-username">@carregando</h2>
        
        <ul class="numbers">
            <li class="numbers-item">
                <h4>Repositórios</h4>
                <span id="repos">0</span>
            </li>
            <li class="numbers-item">
                <h4>Seguidores</h4>
                <span id="followers">0</span>
            </li>
            <li class="numbers-item">
                <h4>Seguindo</h4>
                <span id="following">0</span>
            </li>
        </ul>
        
        <a id="link" href="#" class="profile-link">Ver no Github</a>
    </header> 

    <script src="main.js"></script>
</body>
</html>
